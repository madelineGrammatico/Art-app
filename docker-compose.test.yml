services:
  postgres-test:
    image: postgres:16-alpine
    container_name: art_app_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: art_app_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d art_app_test"]
      interval: 2s
      timeout: 5s
      retries: 10
